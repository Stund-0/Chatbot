services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_dev
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot_dev@postgres:5432/chatbot
      MODO_SIMULACION: "true"
      DEBUG: "true"
      WHATSAPP_VERIFY_TOKEN: chatbot123
      ADMIN_TELEFONO: ""
      ADMIN_CORREO: ""
      REPORTES_API_KEY: dev-key-change-in-production
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
